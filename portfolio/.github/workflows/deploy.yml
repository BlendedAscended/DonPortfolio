name: Deploy Portfolio to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-portfolio
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT }}
          timeout: 120s
          script: |
            set -e
            echo "━━━ Deploying Portfolio ━━━"
            cd /var/www/portfolio

            git fetch origin main
            git reset --hard origin/main

            npm ci --prefer-offline --omit=dev
            npm run build

            pm2 reload portfolio --update-env

            # Health check on port 3001
            for i in $(seq 1 10); do
              if curl -sf http://localhost:3001 > /dev/null 2>&1; then
                echo "✓ Portfolio responding on :3001"
                break
              fi
              sleep 3
            done

            pm2 list
            echo "━━━ Portfolio deployment complete ━━━"

      - name: Notify on failure
        if: failure()
        run: echo "::error::Portfolio deployment failed."
